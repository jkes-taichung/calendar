<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全校行事曆系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    /* 保留您原本的 CSS 樣式，此處省略以節省版面，請將您原本的 <style> 內容完整貼在這裡 */
    body { background-color: #000; color: #fff; font-family: "Microsoft JhengHei", sans-serif; padding-bottom: 20px; }
    .header-container { max-width: 1000px; margin: 10px auto; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; }
    .system-title { font-size: 20px; font-weight: bold; color: #fff; }
    .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
    .today-icon-box { width: 36px; height: 36px; border: 1.5px solid #666; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #000; background: #ffc107; cursor: pointer;}
    .current-month-txt { font-size: 22px; font-weight: bold; min-width: 150px; text-align: center; }
    .btn-nav { background: #222; border: 1px solid #444; color: #fff; padding: 5px 15px; border-radius: 5px; cursor: pointer;}
    .calendar-table { width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; table-layout: fixed; }
    .calendar-table th { color: #888; text-align: center; padding: 10px 0; font-size: 13px; border-bottom: 1px solid #222; }
    .calendar-table td { border: 0.5px solid #222; min-height: 50px; vertical-align: top; padding: 5px; cursor: pointer; }
    .date-num { font-size: 14px; text-align: center; width: 28px; margin: 0 auto 5px; }
    .today-bg .date-num { background: #ffc107; color: #000; border-radius: 4px; font-weight: bold; }
    .other-month { opacity: 0.1; pointer-events: none; }
    .event-item { font-size: 12px; padding: 4px 8px; border-radius: 6px; margin-bottom: 5px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border: 1.5px solid #5a78af; background: #3b4c6b; color: #ffffff; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
    /* (其他您自訂的 Modal 與 Offcanvas 樣式請一併保留) */
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner-border text-light"></div></div>

<div class="offcanvas offcanvas-start bg-dark text-white" id="menuOffcanvas">
  <div class="offcanvas-header border-bottom border-secondary">
    <h5 class="offcanvas-title">功能選單</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div id="userInfoArea" class="text-info small mb-3">👤 您尚未登入</div>
    <button class="btn btn-outline-light py-3 w-100 mb-3" id="loginBtn" onclick="openLogin()">🔑 帳號登入</button>
    <button class="btn btn-outline-danger py-3 w-100 mb-3" id="logoutBtn" onclick="doLogout()" style="display:none">🚪 登出系統</button>
    <button class="btn btn-success py-3 w-100" id="syncBtn" onclick="startGoogleCalendarSync()">📅 同步日曆至 Google</button>
  </div>
</div>

<div class="header-container">
  <button class="btn btn-outline-secondary" data-bs-toggle="offcanvas" data-bs-target="#menuOffcanvas">☰ 選單</button>
  <div class="system-title">📅 全校行事曆系統</div>
  <div style="width:60px"></div>
</div>

<div class="controls">
  <button class="btn-nav" onclick="changeMonth(-1)">❮</button>
  <div class="current-month-txt" id="monthDisplay"></div>
  <button class="btn-nav" onclick="changeMonth(1)">❯</button>
  <div class="today-icon-box" onclick="goToday()" id="todayIcon"></div>
</div>

<table class="calendar-table">
  <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
  <tbody id="calendarBody"></tbody>
</table>

<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border-info text-white">
      <form onsubmit="event.preventDefault(); doLogin();">
        <div class="modal-body text-center p-4">
          <h5>行政人員驗證</h5>
          <input type="text" id="accInput" class="form-control text-center mb-3" placeholder="請輸入學務系統帳號" required>
          <button type="submit" class="btn btn-info w-100">登入</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border-secondary text-white">
      <form id="editForm">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="modalTitle">事件管理</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="fieldRowIndex">
          <div class="mb-3"><label class="small text-secondary">日期</label><input type="date" id="fieldDate" class="form-control bg-secondary text-white border-0" readonly></div>
          <div class="mb-3"><label class="small text-secondary">活動標題</label><input type="text" id="fieldTitle" class="form-control bg-secondary text-white border-0" required></div>
          <div class="mb-3"><label class="small text-secondary">詳細內容 (內文)</label><textarea id="fieldContent" class="form-control bg-secondary text-white border-0" rows="4"></textarea></div>
          <div id="authorDisplay" class="small text-warning"></div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" id="btnDel" class="btn btn-outline-danger me-auto" style="display:none" onclick="doDelete()">刪除</button>
          <button type="submit" id="btnSave" class="btn btn-primary">儲存資料</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ==========================================
  // 核心設定區：請填入您的 GAS 部署網址
  // ==========================================
  const GAS_WEBAPP_URL = "https://script.google.com/macros/s/填入您最新的部署ID/exec"; 
  
  // 您在 GCP 上設定的憑證
  const GOOGLE_CLIENT_ID = "910541370606-lgqpiu012f5o7196bk6gcuh04ad9ek5o.apps.googleusercontent.com";
  const GOOGLE_API_KEY = "AIzaSyBmlZIUQebk-Xq9np-ir-rWbz3--XY_d6E";
  let tokenClient;

  let events = [];
  let currentUser = null;
  let currentMonth = new Date();
  
  const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
  const editModal = new bootstrap.Modal(document.getElementById('editModal'));

  // 統一處理呼叫 GAS API 的函數 (使用 fetch 代替 google.script.run)
  async function callGasApi(action, payload = {}) {
    try {
      const response = await fetch(GAS_WEBAPP_URL, {
        method: "POST",
        // 為了避免 GitHub Pages 發送 OPTIONS (Preflight) 導致 CORS 錯誤，使用 text/plain
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: action, payload: payload })
      });
      return await response.json();
    } catch (error) {
      console.error("API Error:", error);
      Swal.fire('網路錯誤', '無法連線至資料庫，請稍後再試。', 'error');
      return { status: "error" };
    }
  }

  window.onload = function() {
    document.getElementById('todayIcon').innerText = new Date().getDate();
    fetchData();
    initGoogleAuth();
  };

  function initGoogleAuth() {
    // 初始化 Google Identity Services
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/calendar.events',
      callback: (tokenResponse) => {
        if (tokenResponse && tokenResponse.access_token) {
          executeCalendarSync(tokenResponse.access_token);
        }
      }
    });
  }

  function toggleLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
  function goToday() { currentMonth = new Date(); render(); }
  function openLogin() { 
    bootstrap.Offcanvas.getInstance(document.getElementById('menuOffcanvas')).hide();
    loginModal.show(); 
  }

  // 抓取資料
  async function fetchData() {
    toggleLoading(true);
    const res = await callGasApi("getEvents");
    if (res.status === "success") {
      events = res.data;
      render();
    }
    toggleLoading(false);
  }

  // 登入
  async function doLogin() {
    const acc = document.getElementById('accInput').value;
    if(!acc) return;
    toggleLoading(true);
    const res = await callGasApi("login", { account: acc });
    toggleLoading(false);
    
    if(res.status === "success") {
      currentUser = res;
      document.getElementById('userInfoArea').innerText = `👤 已登入：${res.name} (${res.dept})`;
      document.getElementById('loginBtn').style.display = "none";
      document.getElementById('logoutBtn').style.display = "block";
      loginModal.hide();
      render();
      Swal.fire('登入成功', `歡迎回來，${res.name}！`, 'success');
    } else { 
      document.getElementById('accInput').value = "";
      Swal.fire('驗證失敗', res.msg || '帳號不正確', 'error');
    }
  }

  function doLogout() {
    currentUser = null;
    document.getElementById('userInfoArea').innerText = "👤 您尚未登入";
    document.getElementById('loginBtn').style.display = "block";
    document.getElementById('logoutBtn').style.display = "none";
    render();
    Swal.fire('已登出', '您已成功登出系統。', 'info');
  }

  // 渲染日曆
  function render() {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth();
    document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayStr = new Date().toLocaleDateString('en-CA'); 
    const tbody = document.getElementById('calendarBody');
    tbody.innerHTML = '';

    let dateCount = 1;
    for (let i = 0; i < 6; i++) {
      let row = document.createElement('tr');
      for (let j = 0; j < 7; j++) {
        let cell = document.createElement('td');
        if ((i === 0 && j < firstDay) || dateCount > daysInMonth) {
          cell.classList.add('other-month');
        } else {
          let d = dateCount;
          let fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          if (fullDate === todayStr) cell.classList.add('today-bg');
          
          cell.innerHTML = `<div class="date-num">${d}</div><div id="ev-${fullDate}"></div>`;
          cell.onclick = () => handleDateClick(fullDate);

          const dayEvents = events.filter(e => e['日期'] === fullDate);
          const container = cell.querySelector('div[id^="ev-"]');
          
          dayEvents.forEach(e => {
            const div = document.createElement('div');
            const isMine = currentUser && (String(e['姓名']) === String(currentUser.name));
            div.className = "event-item";
            div.innerText = e['標題'];
            div.onclick = (ex) => { ex.stopPropagation(); handleEventEdit(e, isMine); };
            container.appendChild(div);
          });
          dateCount++;
        }
        row.appendChild(cell);
      }
      tbody.appendChild(row);
      if (dateCount > daysInMonth) break;
    }
  }

  function handleDateClick(date) {
    if(!currentUser) { 
      Swal.fire('提示', '請先從選單登入帳號方可新增事件。', 'warning');
      return; 
    }
    document.getElementById('editForm').reset();
    document.getElementById('fieldRowIndex').value = "";
    document.getElementById('fieldDate').value = date;
    document.getElementById('modalTitle').innerText = "新增行事曆事件";
    document.getElementById('btnDel').style.display = "none";
    document.getElementById('btnSave').style.display = "block";
    document.getElementById('authorDisplay').innerText = "發布者：" + currentUser.name;
    editModal.show();
  }

  function handleEventEdit(e, isMine) {
    document.getElementById('fieldRowIndex').value = e.rowIndex;
    document.getElementById('fieldDate').value = e['日期'];
    document.getElementById('fieldTitle').value = e['標題'];
    document.getElementById('fieldContent').value = e['內文'] || "";
    document.getElementById('modalTitle').innerText = isMine ? "修改您的事件" : "事件詳情 (唯讀)";
    document.getElementById('authorDisplay').innerText = `發布者：${e['姓名']} (${e['處室']})`;
    
    document.getElementById('btnSave').style.display = isMine ? "block" : "none";
    document.getElementById('btnDel').style.display = isMine ? "block" : "none";
    editModal.show();
  }

  // 儲存事件
  document.getElementById('editForm').onsubmit = async function(ev) {
    ev.preventDefault();
    toggleLoading(true);
    const formData = {
      rowIndex: document.getElementById('fieldRowIndex').value,
      date: document.getElementById('fieldDate').value,
      title: document.getElementById('fieldTitle').value,
      content: document.getElementById('fieldContent').value
    };
    
    const res = await callGasApi("saveEvent", { formData: formData, user: currentUser });
    toggleLoading(false);
    
    if (res.status === "success") {
      Swal.fire('成功', res.msg, 'success');
      editModal.hide();
      fetchData();
    } else {
      Swal.fire('錯誤', res.msg, 'error');
    }
  };

  // 刪除事件
  async function doDelete() {
    const result = await Swal.fire({
      title: '確定要刪除嗎？', text: "永久刪除", icon: 'warning', showCancelButton: true, confirmButtonText: '刪除'
    });
    if (result.isConfirmed) {
      toggleLoading(true);
      const res = await callGasApi("deleteEvent", { rowIndex: document.getElementById('fieldRowIndex').value, user: currentUser });
      toggleLoading(false);
      if (res.status === "success") {
        Swal.fire('已刪除', res.msg, 'success');
        editModal.hide();
        fetchData();
      } else {
        Swal.fire('錯誤', res.msg, 'error');
      }
    }
  }

  function changeMonth(s) { currentMonth.setMonth(currentMonth.getMonth() + s); render(); }

  // ==========================================
  // 前端直接呼叫 Google 日曆 API 同步功能
  // ==========================================
  function startGoogleCalendarSync() {
    Swal.fire({
      title: '授權與同步',
      text: "將跳出 Google 視窗請您授權日曆權限，接著會將本月行程寫入您的日曆。",
      icon: 'info',
      showCancelButton: true,
      confirmButtonText: '開始授權'
    }).then((result) => {
      if (result.isConfirmed) {
        // 喚起 Google 登入與授權視窗
        tokenClient.requestAccessToken();
      }
    });
  }

  async function executeCalendarSync(accessToken) {
    toggleLoading(true);
    const year = currentMonth.getFullYear();
    const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
    const currentMonthPrefix = `${year}-${month}`;
    
    // 篩選畫面上「當月」的事件
    const monthEvents = events.filter(e => e['日期'] && e['日期'].startsWith(currentMonthPrefix));
    let successCount = 0;
    let failCount = 0;

    for (const ev of monthEvents) {
      const eventBody = {
        summary: `[全校] ${ev['標題']}`,
        description: `詳細內容：${ev['內文'] || ''}\n發布單位：${ev['處室'] || ''} ${ev['姓名'] || ''}`,
        start: { date: ev['日期'] },
        end: { date: ev['日期'] } // 全天事件結束日期與開始日期相同 (Google API 要求)
      };

      try {
        const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(eventBody)
        });

        if (response.ok) {
          successCount++;
        } else {
          failCount++;
          console.error("寫入日曆失敗", await response.text());
        }
      } catch (e) {
        failCount++;
      }
    }
    
    toggleLoading(false);
    Swal.fire('同步完成', `成功寫入 ${successCount} 筆，失敗 ${failCount} 筆。請檢查您的 Google 日曆。`, successCount > 0 ? 'success' : 'warning');
  }

</script>
</body>
</html>
