<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let events = [];
  let currentUser = null;
  let currentMonth = new Date();
  
  // 💡 🔑 【請在此處填入您的 Google OAuth2 用戶端 ID】
  const CLIENT_ID = '請替換成您的_OAuth_用戶端_ID.apps.googleusercontent.com';
  let tokenClient;

  const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
  const editModal = new bootstrap.Modal(document.getElementById('editModal'));

  // 提升密碼欄位變數至全域，修復原程式底部的 ReferenceError 錯誤
  let accInput, togglePasswordBtn, eyeIcon;

  // 睜開眼睛的 SVG 路徑
  const eyeOpenSvg = `<path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>`;

  // 閉上眼睛的 SVG 路徑
  const eyeCloseSvg = `<path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829z"/><path d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/>`;

window.onload = function() {
  fetchData();

  const today = new Date();
  const icon = document.getElementById('todayIcon');
  if(icon) icon.innerText = today.getDate();

  accInput = document.getElementById('accInput');
  togglePasswordBtn = document.getElementById('togglePasswordBtn');
  eyeIcon = document.getElementById('eyeIcon');

  // 初始化 Google Identity Client 元件
  initGoogleClient();

  // 若在 Google Apps Script 容器內則自動載入電子郵件，若在 GitHub 則抓不到，捕捉異常以防程式中斷
  try {
    google.script.run.withSuccessHandler(email => {
      document.getElementById('userEmailArea').innerText = "📧 Google 帳號: " + email;
      const syncBtnUser = document.getElementById('syncBtnUser');
      if (syncBtnUser) {
        syncBtnUser.innerText = email;
      }
    }).getUserEmail();
  } catch(e) {
    console.log("非 GAS 容器環境，略過 getUserEmail 呼叫。");
  }
};

// 💡 初始化 Google 憑證用戶端（適用於 GitHub Pages 靜態網頁端網址）
function initGoogleClient() {
  if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/calendar.events',
      callback: (tokenResponse) => {
        if (tokenResponse && tokenResponse.access_token) {
          // 授權成功，攜帶 Access Token 前往執行同步日曆
          executeCalendarSync(tokenResponse.access_token);
        }
      },
    });
  }
}

function goToday() {
    currentMonth = new Date(); // 重設時間物件
    render(); // 重新畫日曆
}

  function fetchData() {
    toggleLoading(true);
    google.script.run.withSuccessHandler(data => {
      events = data;
      render();
      toggleLoading(false);
    }).getCalendarData();
  }

  function openLogin() { 
    bootstrap.Offcanvas.getInstance(document.getElementById('menuOffcanvas')).hide();
    loginModal.show(); 
  }

  function doLogin() {
  const acc = document.getElementById('accInput').value;
  if(!acc) return;
  toggleLoading(true);
  google.script.run.withSuccessHandler(res => {
    toggleLoading(false);
    if(res.status === "success") {
      currentUser = res;
      document.getElementById('userInfoArea').innerText = `👤 已登入：${res.name} (${res.dept})`;
      document.getElementById('loginBtn').style.display = "none";
      document.getElementById('logoutBtn').style.display = "block";
      document.getElementById('syncBtn').style.display = "block"; 
      loginModal.hide();
      render();
      Swal.fire('登入成功', `歡迎回來，${res.name}！`, 'success');
    } else { 
      accInput.value = ""; 
      accInput.focus(); 
      Swal.fire('驗證失敗', '帳號不正確，請重新輸入，如有問題請洽 資訊組。', 'error');
    }
  }).loginCheck(acc);
}

// 💡 修改後的同步按鈕入口：直接採用前端 API 同步機制
function doSyncCalendar() {
  if (!CLIENT_ID || CLIENT_ID.includes('請替換成您的')) {
    Swal.fire('系統設定提示', '請在專案程式碼的 <b>CLIENT_ID</b> 變數中填入您的 Google OAuth 用戶端 ID 才能執行同步。', 'warning');
    return;
  }

  Swal.fire({
    title: '同步日曆？',
    text: "系統將把畫面上「本月份」的所有行程事件同步至您的 Google 日曆，是否繼續？",
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: '確定同步',
    cancelButtonText: '取消'
  }).then((result) => {
    if (result.isConfirmed) {
      if (tokenClient) {
        // 彈出視窗請求 Google 登入授權
        tokenClient.requestAccessToken({prompt: 'consent'});
      } else {
        Swal.fire('錯誤', 'Google 認證元件尚未加載完畢，請重新整理頁面再試一次。', 'error');
      }
    }
  });
}

// 💡 核心優化：直接由網頁端對 Google 日曆發送同步請求（支援防重複與 19:00 提醒）
async function executeCalendarSync(accessToken) {
  toggleLoading(true);
  
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  // 篩選出目前網頁日曆上顯示之該月份的所有事件
  const currentMonthEvents = events.filter(e => {
    if (!e['日期']) return false;
    const d = new Date(e['日期']);
    return d.getFullYear() === year && d.getMonth() === month;
  });

  if (currentMonthEvents.length === 0) {
    toggleLoading(false);
    Swal.fire('提示', '本月份目前沒有任何行程資料可以同步。', 'info');
    return;
  }

  let successCount = 0;
  let skipCount = 0; 
  let failCount = 0;

  try {
    // 批次處理本月所有行程
    await Promise.all(currentMonthEvents.map(async (item) => {
      const eventTitle = item['標題'] || '未命名事件';
      const eventContent = item['內文'] || item['內容'] || '由行政行事曆系統自動同步';
      const startDate = new Date(item['日期']);
      
      if (isNaN(startDate.getTime())) return;

      const endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 1); 
      
      const timeMin = startDate.toISOString();
      const timeMax = endDate.toISOString();
      const startStr = startDate.toISOString().split('T')[0];
      const endStr = endDate.toISOString().split('T')[0];

      // --- 🔍 步驟 1：防止重複項目檢查 ---
      const searchUrl = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&timeMax=${timeMax}&q=${encodeURIComponent(eventTitle)}`;
      const searchResponse = await fetch(searchUrl, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      const searchData = await searchResponse.json();
      
      // 比對 Google 回傳的摘要是否完全相同
      const isDuplicate = searchData.items && searchData.items.some(gEvent => gEvent.summary === eventTitle);

      if (isDuplicate) {
        skipCount++; // 重複則直接跳過不寫入
        return; 
      }

      // --- ✍️ 步驟 2：執行日曆寫入（自訂前一天下午 7:00 提醒） ---
      const eventBody = {
        summary: eventTitle,
        description: eventContent,
        start: { date: startStr },
        end: { date: endStr },
        reminders: {
          useDefault: false, // 關閉 Google 預設提醒
          overrides: [
            { 
              method: 'popup', 
              minutes: 300 // 💡 從當天午夜 00:00 往前推 300 分鐘 (5小時)，即為前一天的 下午 7:00
            }
          ]
        }
      };

      const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(eventBody)
      });

      if (response.ok) {
        successCount++;
      } else {
        failCount++;
      }
    }));

    toggleLoading(false);
    
    let finalMsg = `同步處理完成！\n✅ 新增：${successCount} 筆\n⏭️ 跳過(重複)：${skipCount} 筆`;
    if (failCount > 0) finalMsg += `\n❌ 失敗：${failCount} 筆`;
    
    Swal.fire('同步結果', finalMsg, failCount > 0 ? 'warning' : 'success');

  } catch (error) {
    console.error('同步過程發生錯誤:', error);
    toggleLoading(false);
    Swal.fire('同步失敗', '與 Google 日曆連線時發生錯誤，請稍後再試。', 'error');
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('userInfoArea').innerText = "👤 您尚未登入";
  document.getElementById('loginBtn').style.display = "block";
  document.getElementById('logoutBtn').style.display = "none";
  document.getElementById('syncBtn').style.display = "block"; 
  currentMonth = new Date();
  const offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('menuOffcanvas'));
  if (offcanvas) offcanvas.hide();
  render();
  Swal.fire('已登出', '您已成功登出系統。', 'info');
}

  function render() {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth();
    document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayStr = new Date().toLocaleDateString('en-CA'); 
    const tbody = document.getElementById('calendarBody');
    tbody.innerHTML = '';

    let dateCount = 1;
    for (let i = 0; i < 6; i++) {
      let row = document.createElement('tr');
      for (let j = 0; j < 7; j++) {
        let cell = document.createElement('td');
        if ((i === 0 && j < firstDay) || dateCount > daysInMonth) {
          cell.classList.add('other-month');
        } else {
          let d = dateCount;
          let fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          if (fullDate === todayStr) cell.classList.add('today-bg');
          
          cell.innerHTML = `<div class="date-num">${d}</div><div id="ev-${fullDate}"></div>`;
          cell.onclick = () => handleDateClick(fullDate);

          const dayEvents = events.filter(e => e['日期'] === fullDate);
          const container = cell.querySelector('div[id^="ev-"]');
          
      dayEvents.forEach(e => {
  const div = document.createElement('div');
  const isMine = currentUser && (String(e['姓名']) === String(currentUser.name));
  div.className = `event-item ${isMine ? 'event-mine' : 'event-others'}`;

  const fullTitle = String(e['標題']);
  
 if (window.innerWidth < 768) {
    let shortTitle = fullTitle.substring(0, 6);
    if (shortTitle.length > 3) {
      div.innerHTML = shortTitle.substring(0, 3) + "<br>" + shortTitle.substring(3, 6);
    } else {
      div.innerHTML = shortTitle;
    }
  } else {
    div.innerText = fullTitle; 
  }

  div.onclick = (ex) => { ex.stopPropagation(); handleEventEdit(e, isMine); };
  container.appendChild(div);
});
          dateCount++;
        }
        row.appendChild(cell);
      }
      tbody.appendChild(row);
      if (dateCount > daysInMonth) break;
    }
  }

  function handleDateClick(date) {
    if(!currentUser) { 
      Swal.fire('提示', '請先從選單登入帳號方可新增事件。', 'warning');
      return; 
    }
    document.getElementById('editForm').reset();
    document.getElementById('fieldRowIndex').value = "";
    document.getElementById('fieldDate').value = date;
    document.getElementById('modalTitle').innerText = "新增行事曆事件";
    document.getElementById('btnDel').style.display = "none";
    document.getElementById('btnSave').style.display = "block";
    document.getElementById('authorDisplay').innerText = "發布者：" + currentUser.name;
    editModal.show();
  }

  function handleEventEdit(e, isMine) {
    document.getElementById('fieldRowIndex').value = e.rowIndex;
    document.getElementById('fieldDate').value = e['日期'];
    document.getElementById('fieldTitle').value = e['標題'];
    document.getElementById('fieldContent').value = e['內文'] || e['內容'] || "";
    document.getElementById('modalTitle').innerText = isMine ? "修改您的事件" : "事件詳情 (唯讀)";
    document.getElementById('authorDisplay').innerText = `發布者：${e['姓名']} (${e['處室']})`;
    
    document.getElementById('btnSave').style.display = isMine ? "block" : "none";
    document.getElementById('btnDel').style.display = isMine ? "block" : "none";
    
    editModal.show();
  }

  document.getElementById('editForm').onsubmit = function(ev) {
    ev.preventDefault();
    toggleLoading(true);
    const formData = {
      rowIndex: document.getElementById('fieldRowIndex').value,
      date: document.getElementById('fieldDate').value,
      title: document.getElementById('fieldTitle').value,
      content: document.getElementById('fieldContent').value
    };
    google.script.run.withSuccessHandler(msg => {
      toggleLoading(false);
      Swal.fire('處理結果', msg, msg.includes('❌') ? 'error' : 'success');
      editModal.hide();
      fetchData();
    }).saveEvent(formData, currentUser);
  };

  function doDelete() {
    Swal.fire({
      title: '確定要刪除嗎？',
      text: "這筆行事曆紀錄將會永久刪除。",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      confirmButtonText: '是的，刪除！',
      cancelButtonText: '取消'
    }).then((result) => {
      if (result.isConfirmed) {
        const rowIndex = document.getElementById('fieldRowIndex').value;
        toggleLoading(true);
        google.script.run.withSuccessHandler(msg => {
          toggleLoading(false);
          Swal.fire('已刪除', msg, 'success');
          editModal.hide();
          fetchData();
        }).deleteEvent(rowIndex, currentUser);
      }
    });
  }

  function changeMonth(s) { currentMonth.setMonth(currentMonth.getMonth() + s); render(); }
  function toggleLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

window.onresize = function() {
  render();
};

// 顯示明碼的函式
function showPassword() {
    accInput.type = "text";
    eyeIcon.innerHTML = eyeOpenSvg;
}

// 隱藏明碼（變回暗碼）的函式
function hidePassword() {
    accInput.type = "password";
    eyeIcon.innerHTML = eyeCloseSvg;
}

// 監聽滑鼠事件
togglePasswordBtn.addEventListener('mousedown', (e) => {
    e.preventDefault(); // 防止輸入框失去焦點
    showPassword();
});

togglePasswordBtn.addEventListener('mouseup', hidePassword);
togglePasswordBtn.addEventListener('mouseleave', hidePassword); // 移開視窗時也要變回密碼

// 針對手機板觸控事件的支援
togglePasswordBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    showPassword();
});
togglePasswordBtn.addEventListener('touchend', hidePassword);
</script>
